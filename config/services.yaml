# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.
# See also https://symfony.com/doc/current/service_container/import.html

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    locale: 'fr'
    site.name_site: 'Iron Front'
    site.name_publisher: 'Zugasti Kevin'
    site.address: '123 Rue Principale, 12345 QuelquePars'
    site.phone: '+33 1 23 45 67 89'
    site.email: 'contact@monsite.fr'
    app.front_debug: '%env(bool:FRONT_DEBUG)%'

    # --- OSM / Geofabrik ---
    # Dossier contenant les .osm.pbf Geofabrik (téléchargés manuellement)
    osm.pbf_dir: 'D:/osm'
    # Binaire osmium (conda). Chemin absolu pour WAMP (pas dans le PATH).
    osm.osmium_binary: 'C:\Users\rocha\miniconda3\Library\bin\osmium.exe'
    # Binaire ogr2ogr (GDAL via conda). Pour conversion PBF → SpatiaLite.
    osm.ogr2ogr_binary: 'C:\Users\rocha\miniconda3\Library\bin\ogr2ogr.exe'
    # Régions Geofabrik : nom => {file, bbox englobante {s,w,n,e}}
    osm.regions:
        africa:
            file: 'africa-260627.osm.pbf'
            bbox: { s: -36.0, w: -18.0, n: 38.0, e: 52.0 }
        antarctica:
            file: 'antarctica-260627.osm.pbf'
            bbox: { s: -90.0, w: -180.0, n: -60.0, e: 180.0 }
        asia:
            file: 'asia-260627.osm.pbf'
            bbox: { s: -12.0, w: 25.0, n: 78.0, e: 180.0 }
        australia_oceania:
            file: 'australia-oceania-260627.osm.pbf'
            bbox: { s: -50.0, w: 110.0, n: 0.0, e: 180.0 }
        central_america:
            file: 'central-america-260627.osm.pbf'
            bbox: { s: 4.0, w: -119.0, n: 33.0, e: -59.0 }
        europe:
            file: 'europe-latest.osm.pbf'
            bbox: { s: 35.0, w: -25.0, n: 72.0, e: 45.0 }
        north_america:
            file: 'north-america-latest.osm.pbf'
            bbox: { s: 4.0, w: -168.0, n: 84.0, e: -52.0 }
        south_america:
            file: 'south-america-260627.osm.pbf'
            bbox: { s: -57.0, w: -82.0, n: 14.0, e: -34.0 }

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # Chaque CompilerPhase est taguée pour injection dans WorldCompiler (Open/Closed)
    _instanceof:
        App\Service\Osm\CompilerPhase:
            tags: ['app.osm_compiler_phase']

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones
    App\Domain\Events\AccessDeniedSubscriber:
        tags: [kernel.event_subscriber]

    App\Domain\Events\LocaleSubscriber:
        arguments:
            $defaultLocale: '%locale%'
        tags:
            - { name: kernel.event_subscriber }

    Imagine\Image\ImagineInterface:
        class: Imagine\Gd\Imagine

    # Event Publisher
    App\Domain\Events\EventPublisher: '@App\Infrastructure\DatabaseEventPublisher'

    App\Command\WorldExpansionCommand:
        autowire: true

    # Commande de compilation OSM (nouvelle architecture)
    App\Command\WorldCompileCommand:
        arguments:
            $pbfDir: '%osm.pbf_dir%'
            $osmiumBinary: '%osm.osmium_binary%'
            $osmRegions: '%osm.regions%'

    # Commande de génération des chunks et deposits à partir des routes importées
    App\Command\GenerateDepositsCommand:
        autowire: true

    # Gestionnaire de checkpoints pour reprise après crash
    App\Service\Game\Road\ImportCheckpointManager:
        arguments:
            $roadSegmentRepository: '@App\Repository\RoadSegmentRepository'

    # --- OSM Pipeline ---

    # Étape 1 : Import brut
    App\Service\Osm\RawImportService:
        arguments:
            $osmiumBinary: '%osm.osmium_binary%'

    # Étape 2 : Normalisation
    App\Service\Osm\RoadNormalizer: ~

    # Étape 3-4 : Construction du graphe
    App\Service\Osm\GraphBuilder: ~

    # Étape 5 : Index spatial
    App\Service\Osm\SpatialIndexer: ~

    # Étape 9 : Gameplay
    App\Service\Osm\GameplayCompiler: ~

    # Orchestrateur : phases injectées via le tag app.osm_compiler_phase (Open/Closed)
    App\Service\Osm\WorldCompiler:
        arguments:
            $phases: !tagged_iterator app.osm_compiler_phase

    # Provider pour le moteur de jeu
    App\Service\Osm\RoadProvider: ~

    # Provider indexé
    App\Service\Game\Generate\RoadIndexProvider: ~